name: Claude Code Review

# PR이 열리거나 업데이트될 때 + @claude 멘션할 때 실행
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write  # claude-code-action 이 OIDC 토큰을 발급받는 데 필요

jobs:
  review:
    runs-on: ubuntu-latest
    # PR 이벤트이거나, 코멘트에 @claude가 포함된 경우에만 실행
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Skip when Claude API key is not configured
        if: env.ANTHROPIC_API_KEY == ''
        run: echo "ANTHROPIC_API_KEY is not configured; skipping optional Claude code review."

      - uses: anthropics/claude-code-action@v1
        if: env.ANTHROPIC_API_KEY != ''
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
