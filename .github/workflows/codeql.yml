name: CodeQL

# 무료 보안 스캔 (public repo 무제한 무료). 유료 Claude Security Review 대체.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '24 6 * * 1'  # 매주 월요일 06:24 UTC 정기 스캔

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # 결과를 Security 탭에 업로드
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          build-mode: none       # Python 은 빌드 불필요

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
