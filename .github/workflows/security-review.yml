name: Claude Security Review

# PR이 열리거나 업데이트될 때 보안 검사 자동 실행
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write  # OIDC 토큰 발급용 (claude-code-action 계열 공통 요구)

jobs:
  security-review:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Skip when Claude API key is not configured
        if: env.ANTHROPIC_API_KEY == ''
        run: echo "ANTHROPIC_API_KEY is not configured; skipping optional Claude security review."

      # claude-code-security-review 는 버전 태그가 없어 @main 을 사용 (@v1 미존재)
      - uses: anthropics/claude-code-security-review@main
        if: env.ANTHROPIC_API_KEY != ''
        with:
          claude-api-key: ${{ env.ANTHROPIC_API_KEY }}  # 이 액션의 입력명은 claude-api-key
