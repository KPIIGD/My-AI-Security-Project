name: Claude Security Review

# PR이 열리거나 업데이트될 때 보안 검사 자동 실행
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  security-review:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Skip when Claude API key is not configured
        if: env.ANTHROPIC_API_KEY == ''
        run: echo "ANTHROPIC_API_KEY is not configured; skipping optional Claude security review."

      - uses: anthropics/claude-code-security-review@v1
        if: env.ANTHROPIC_API_KEY != ''
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
