    entities: [PERSON_NAME, PHONE_MOBILE, PHONE_LANDLINE, EMAIL]
    same_sentence: true
  bank_account:
    entities: [BANK_ACCOUNT]
    requires_any_terms_from: [account_label]
  person_address:
    entities: [PERSON_NAME, ADDRESS_FULL]
